version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "00:00"
    # Cooldown
    cooldown:
      default-days: 14
    # Group all updates into a single PR
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    commit-message:
      # Use conventional commit format as specified in user rules
      prefix: "chore(deps)"
      include: "scope"

  # Rust/Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "00:00"
    # Cooldown
    cooldown:
      default-days: 14
    # Group non-security updates
    groups:
      rust-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ignore alpenlabs/* git dependencies (pinned to specific revs/tags, updated manually)
    ignore:
      - dependency-name: "strata-*"
      - dependency-name: "btc-tracker"
      - dependency-name: "moho-*"
      - dependency-name: "ssz"
      - dependency-name: "ssz_*"
      - dependency-name: "tree_hash"
      - dependency-name: "tree_hash_derive"
      - dependency-name: "zkaleido*"
    # Security updates remain ungrouped for urgent handling
    open-pull-requests-limit: 20
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # SP1 guest program (not a workspace member)
  - package-ecosystem: "cargo"
    directory: "/guest-builder/sp1/guest-asm"
    schedule:
      interval: "monthly"
      time: "00:00"
    # Cooldown
    cooldown:
      default-days: 14
    ignore:
      - dependency-name: "strata-*"
      - dependency-name: "btc-tracker"
      - dependency-name: "moho-*"
      - dependency-name: "ssz"
      - dependency-name: "ssz_*"
      - dependency-name: "tree_hash"
      - dependency-name: "tree_hash_derive"
      - dependency-name: "zkaleido*"
    groups:
      sp1-guest-programs:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
