[package]
name = "strata-asm-runner"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
btc-tracker.workspace = true
moho-runtime-impl.workspace = true
moho-runtime-interface.workspace = true
moho-types.workspace = true
strata-asm-rpc.workspace = true
strata-bridge-common.workspace = true
strata-btc-verification.workspace = true

strata-asm-common.workspace = true
strata-asm-params.workspace = true
strata-asm-proof-db.workspace = true
strata-asm-proof-impl.workspace = true
strata-asm-proof-types.workspace = true
strata-asm-proto-bridge-v1.workspace = true
strata-asm-txs-bridge-v1.workspace = true
strata-asm-worker.workspace = true
strata-btc-types.workspace = true

# Storage deps — now only needed by the runner binary, not ASM library crates
# TODO(STR-2544): eliminate it completely
strata-db-store-sled = { git = "https://github.com/alpenlabs/alpen.git", rev = "02fe60d1b74470da3db67352b2f74625eb2e0ed1" }
strata-state = { git = "https://github.com/alpenlabs/alpen.git", rev = "02fe60d1b74470da3db67352b2f74625eb2e0ed1" }
