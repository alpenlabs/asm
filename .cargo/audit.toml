  "RUSTSEC-2026-0044",
  "RUSTSEC-2026-0048",

  # RUSTSEC-2026-0049 (rustls-webpki 0.101.7) — CRL matching logic error
  # rustls-webpki 0.103.9 was bumped to 0.103.10 via cargo update.
